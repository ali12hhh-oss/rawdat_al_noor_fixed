name: Flutter Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=${{ env.FLUTTER_ROOT }}" >> android/local.properties
          echo "✅ local.properties created"
          cat android/local.properties

      - name: Install Gradle 8.13
        run: |
          echo "📦 Installing Gradle 8.13..."
          wget -q https://services.gradle.org/distributions/gradle-8.13-bin.zip
          unzip -q gradle-8.13-bin.zip
          sudo mv gradle-8.13 /opt/gradle
          sudo ln -sf /opt/gradle/bin/gradle /usr/bin/gradle
          gradle --version

      - name: Fix intl version conflict
        run: |
          if grep -q "intl: ^0.19.0" pubspec.yaml; then
            sed -i 's/intl: ^0.19.0/intl: ^0.20.2/g' pubspec.yaml
            echo "✅ Updated intl to ^0.20.2"
          else
            echo "ℹ️ intl version is compatible"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: |
          cd android
          gradle assembleRelease
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Build App Bundle (release)
        run: |
          cd android
          gradle bundleRelease
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
