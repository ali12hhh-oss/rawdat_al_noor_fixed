name: Flutter Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=${{ env.FLUTTER_ROOT }}" >> android/local.properties
          echo "✅ local.properties created"
          cat android/local.properties

      # ✅ تثبيت Gradle واستخدامه لإنشاء Wrapper
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      # ✅ إنشاء Gradle Wrapper من الصفر
      - name: Create Gradle Wrapper
        working-directory: android
        run: |
          echo "📦 Creating Gradle Wrapper..."
          
          # إنشاء مجلد wrapper إذا لم يكن موجوداً
          mkdir -p gradle/wrapper
          
          # إنشاء ملف gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.13-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # تحميل gradle-wrapper.jar من الإنترنت
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.13.0/gradle/wrapper/gradle-wrapper.jar
          
          # منح صلاحيات التنفيذ
          chmod +x gradlew
          
          # التحقق
          echo "📁 Files created:"
          ls -la gradle/wrapper/

      # ✅ إصلاح تضارب intl
      - name: Fix intl version conflict
        run: |
          if grep -q "intl: ^0.19.0" pubspec.yaml; then
            sed -i 's/intl: ^0.19.0/intl: ^0.20.2/g' pubspec.yaml
            echo "✅ Updated intl to ^0.20.2"
          else
            echo "ℹ️ intl version is compatible"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release)
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
