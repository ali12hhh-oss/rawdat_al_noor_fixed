name: Flutter Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ✅ إضافة 1: إعداد Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ✅ إضافة 2: إنشاء ملف local.properties (الحل الأساسي للمشكلة)
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "✅ local.properties created at android/local.properties"
          cat android/local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Regenerate Gradle Wrapper (fixes missing/corrupt gradle-wrapper.jar)
        working-directory: android
        run: gradle wrapper --gradle-version 8.13 --distribution-type all

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project (non-blocking)
        run: flutter analyze || true

      - name: Run tests (if any)
        run: flutter test || true

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release)
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
